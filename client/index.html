<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chatbot</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #343541;
  color: #fff;
}

/* Layout */
.container {
  display: flex;
  height: 100vh;
}

/* Sidebar */
.sidebar {
  width: 220px;
  background: #202123;
  padding: 15px;
}

.sidebar h2 {
  font-size: 18px;
}

.new-chat {
  background: #444654;
  padding: 10px;
  border-radius: 5px;
  cursor: pointer;
  margin-top: 10px;
  text-align: center;
}

.new-chat:hover {
  background: #565869;
}

/* Chat Area */
.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* Messages */
.chat-box {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

/* Message bubble */
.message {
  max-width: 70%;
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 10px;
  line-height: 1.4;
}

.user {
  background: #0b93f6;
  align-self: flex-end;
}

.bot {
  background: #444654;
  align-self: flex-start;
}

/* Input */
.input-area {
  display: flex;
  padding: 15px;
  background: #40414f;
}

.input-area input {
  flex: 1;
  padding: 12px;
  border-radius: 5px;
  border: none;
  outline: none;
}

.input-area button {
  margin-left: 10px;
  padding: 12px 20px;
  background: #19c37d;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  color: white;
}

.input-area button:hover {
  background: #17a36b;
}
</style>

</head>

<body>

<div class="container">

  <!-- Sidebar -->

  <div class="sidebar">
    <h2>Chatbot</h2>
    <div class="new-chat" onclick="newChat()">+ New Chat</div>
  </div>

  <!-- Chat -->

  <div class="chat-area">
    <div id="chat-box" class="chat-box"></div>

```
<div class="input-area">
  <input type="text" id="message" placeholder="Ketik pesan..." onkeypress="handleKey(event)">
  <button onclick="sendMessage()">Kirim</button>
</div>
```

  </div>

</div>

<script>
const chatBox = document.getElementById("chat-box");

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerText = text;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function sendMessage() {
  const input = document.getElementById("message");
  const message = input.value.trim();

  if (!message) return;

  addMessage("Kamu: " + message, "user");
  input.value = "";

  // 🔴 GANTI URL SERVER
  fetch("http://localhost:8080/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message: message })
  })
  .then(res => res.json())
  .then(data => {
    addMessage("Bot: " + data.reply, "bot");
  })
  .catch(() => {
    addMessage("Error koneksi ke server", "bot");
  });
}

function handleKey(e) {
  if (e.key === "Enter") {
    sendMessage();
  }
}

function newChat() {
  chatBox.innerHTML = "";
}
</script>

</body>
</html>
