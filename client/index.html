<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova AI — Asisten Cerdas</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #111118;
            --surface2: #16161f;
            --surface3: #1c1c28;
            --border: rgba(255,255,255,0.07);
            --border2: rgba(255,255,255,0.12);
            --accent: #7c6af7;
            --accent2: #a78bfa;
            --accent-glow: rgba(124,106,247,0.18);
            --text: #e8e8f0;
            --text2: #8a8a9a;
            --text3: #555566;
            --user-bg: #1e1b3a;
            --user-border: rgba(124,106,247,0.25);
            --radius: 16px;
            --radius-sm: 10px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        .app { display: flex; height: 100vh; }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            flex-shrink: 0;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px 14px;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px 16px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 4px;
        }

        .brand-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #7c6af7, #a78bfa);
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-icon svg { width: 16px; height: 16px; fill: white; }

        .brand-name {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 500;
            background: linear-gradient(135deg, #e8e8f0, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .new-chat-btn {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 11px 14px;
            background: var(--surface3);
            border: 1px solid var(--border2);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 13.5px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .new-chat-btn:hover {
            background: var(--accent-glow);
            border-color: rgba(124,106,247,0.4);
            color: var(--accent2);
        }

        .sidebar-section-label {
            font-size: 10.5px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text3);
            padding: 10px 10px 4px;
        }

        .history-item {
            padding: 9px 12px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            color: var(--text2);
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item:hover { background: var(--surface3); color: var(--text); }
        .history-item.active { background: var(--accent-glow); color: var(--accent2); }

        .sidebar-footer { margin-top: auto; border-top: 1px solid var(--border); padding-top: 14px; }
        .user-info { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: var(--radius-sm); cursor: pointer; }
        .user-avatar { width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg, #5436da, #7c6af7); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: white; }

        /* MAIN CHAT */
        .main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); position: relative; }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 28px;
            border-bottom: 1px solid var(--border);
            background: rgba(10,10,15,0.8);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .model-selector {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 14px;
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: 30px;
            font-size: 13px;
            color: var(--text);
        }

        .model-dot { width: 7px; height: 7px; background: #4ade80; border-radius: 50%; box-shadow: 0 0 6px rgba(74,222,128,0.6); }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 32px 0 180px;
            scroll-behavior: smooth;
        }

        .message-group { max-width: 720px; margin: 0 auto; padding: 0 24px; }

        .msg { display: flex; gap: 14px; margin-bottom: 24px; animation: msgIn 0.3s ease forwards; }

        @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .msg-avatar { width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
        .msg.bot .msg-avatar { background: linear-gradient(135deg, #7c6af7, #a78bfa); color: white; }
        .msg.user .msg-avatar { background: linear-gradient(135deg, #3b2f8f, #5436da); color: white; }

        .msg-body { flex: 1; }
        .msg-name { font-size: 12.5px; font-weight: 600; color: var(--text2); margin-right: 8px; }
        .msg.bot .msg-name { color: var(--accent2); }
        .msg-time { font-size: 11px; color: var(--text3); }
        .msg-bubble { font-size: 14.5px; line-height: 1.7; color: var(--text); margin-top: 4px; }
        .msg.user .msg-bubble { background: var(--user-bg); border: 1px solid var(--user-border); border-radius: var(--radius); border-top-left-radius: 4px; padding: 12px 18px; display: inline-block; }

        /* Typing Animation */
        .typing { display: flex; gap: 5px; padding: 12px 18px; background: var(--surface2); border-radius: var(--radius); width: fit-content; }
        .typing span { width: 6px; height: 6px; background: var(--accent2); border-radius: 50%; animation: pulse 1.2s infinite; opacity: 0.4; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse { 0%, 60%, 100% { opacity: 0.4; transform: scale(1); } 30% { opacity: 1; transform: scale(1.3); } }

        /* INPUT AREA */
        .input-area { position: absolute; bottom: 0; left: 0; right: 0; padding: 16px 24px 24px; background: linear-gradient(to top, var(--bg) 70%, transparent); }
        .input-container { max-width: 720px; margin: 0 auto; }
        .input-box { display: flex; align-items: flex-end; gap: 10px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 18px; padding: 12px 18px; }
        .input-box textarea { flex: 1; background: transparent; border: none; color: var(--text); font-family: inherit; font-size: 14.5px; outline: none; resize: none; max-height: 140px; }
        .send-btn { width: 36px; height: 36px; background: linear-gradient(135deg, #7c6af7, #a78bfa); border: none; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .send-btn:hover { transform: scale(1.05); }
        .send-btn svg { width: 16px; height: 16px; fill: white; }

        .welcome { text-align: center; padding: 60px 20px; }
        .welcome h2 { font-family: 'Playfair Display', serif; font-size: 28px; margin-bottom: 10px; }
        .welcome p { color: var(--text2); margin-bottom: 30px; }
        .suggestions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 500px; margin: 0 auto; }
        .sug-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 15px; cursor: pointer; text-align: left; transition: 0.2s; }
        .sug-card:hover { background: var(--surface3); border-color: var(--accent); }
    </style>
</head>
<body>

<div class="app">
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-icon"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
            <span class="brand-name">Nova AI</span>
        </div>
        <button class="new-chat-btn" onclick="location.reload()">
            <span>＋</span> Percakapan Baru
        </button>
        <div class="sidebar-section-label">Terkini</div>
        <div class="history-item active">Halo! Ada yang bisa saya bantu?</div>
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar">U</div>
                <div class="user-name">Pengguna <br><small style="color:var(--text3)">Free Plan</small></div>
            </div>
        </div>
    </aside>

    <main class="main">
        <div class="topbar">
            <div class="model-selector"><span class="model-dot"></span> Nova 1.5 Pro</div>
        </div>

        <div id="chat-box" class="chat-box">
            <div class="message-group" id="message-group">
                <div class="welcome" id="welcome">
                    <h2>Selamat datang di Nova AI</h2>
                    <p>Mulai percakapan cerdas Anda hari ini.</p>
                    <div class="suggestions">
                        <div class="sug-card" onclick="useSuggestion('Jelaskan cara kerja Docker')">
                            <b>Docker</b><br><small>Cara kerja container</small>
                        </div>
                        <div class="sug-card" onclick="useSuggestion('Tips belajar JavaScript')">
                            <b>Programming</b><br><small>Belajar JS efektif</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-container">
                <div class="input-box">
                    <textarea id="message" placeholder="Kirim pesan ke Nova..." rows="1" onkeydown="handleKey(event)"></textarea>
                    <button class="send-btn" onclick="sendMessage()"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    const chatBox = document.getElementById('chat-box');
    const msgGroup = document.getElementById('message-group');
    const msgInput = document.getElementById('message');

    function getTime() { return new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }); }

    function addMessage(text, role) {
        const welcome = document.getElementById('welcome');
        if (welcome) welcome.remove();

        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${role}`;
        
        const name = role === 'user' ? 'Anda' : 'Nova AI';
        const avatar = role === 'user' ? 'U' : 'AI';

        msgDiv.innerHTML = `
            <div class="msg-avatar">${avatar}</div>
            <div class="msg-body">
                <div class="msg-meta">
                    <span class="msg-name">${name}</span>
                    <span class="msg-time">${getTime()}</span>
                </div>
                <div class="msg-bubble">${text}</div>
            </div>
        `;
        msgGroup.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function addTyping() {
        const typingDiv = document.createElement('div');
        typingDiv.className = 'msg bot';
        typingDiv.id = 'typing';
        typingDiv.innerHTML = `
            <div class="msg-avatar">AI</div>
            <div class="msg-body">
                <div class="typing"><span></span><span></span><span></span></div>
            </div>
        `;
        msgGroup.appendChild(typingDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
        return typingDiv;
    }

    async function sendMessage() {
        const text = msgInput.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        msgInput.value = '';
        const typing = addTyping();

        try {
            // host.docker.internal digunakan agar Docker bisa akses localhost komputer host
            const response = await fetch('http://host.docker.internal:8080', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });

            const data = await response.json();
            typing.remove();
            addMessage(data.reply || data.message, 'bot');
        } catch (error) {
            typing.remove();
            addMessage("Gagal terhubung ke server. Pastikan Backend menyala di port 8080.", "bot");
            console.error("Error:", error);
        }
    }

    function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
    function useSuggestion(text) { msgInput.value = text; sendMessage(); }
</script>

</body>
</html>
