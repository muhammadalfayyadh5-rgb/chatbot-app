version: '3.8'

services:
  # Service Backend (Golang) - Milik Payad
  backend:
    image: muhammadalfayyadh/chatbot-backend:v1
    container_name: chatbot-backend
    environment:
      # Mengambil nilai dari file .env secara otomatis
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GIN_MODE=release
    ports:
      - "8080:8080"
    restart: always
    networks:
      - chatbot-network

  # Service Frontend (Nginx/Web) - Milik Kawan
  frontend:
    image: muhammadnabilfadhila/chatbot-frontend:v1
    container_name: chatbot-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
    networks:
      - chatbot-network

networks:
  chatbot-network:
    driver: bridge