services:
  # Service Backend (Golang)
  backend:
    build: ./server
    image: muhammadalfayyadh/chatbot-backend:v1
    container_name: chatbot-backend
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GIN_MODE=release
    ports:
      - "8080:8080"
    restart: always
    networks:
      - chatbot-network

  # Service Frontend (Nginx/Web)
  frontend:
    build: ./client 
    image: muhammadnabilfadhila/chatbot-frontend:v1.0
    container_name: chatbot-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
    networks:
      - chatbot-network
    # Menambahkan environment agar frontend tahu alamat backend (jika kodenya mendukung)
    environment:
      - BACKEND_URL=http://backend:8080

networks:
  chatbot-network:
    driver: bridge